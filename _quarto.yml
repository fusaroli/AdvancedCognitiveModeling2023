    - 05-ModelQualityChecks.qmd
    - 06-MultilevelModels.qmd
    - 07-ModelComparison.qmd
    - 08-MixtureModels.qmd
    - 09-TheoryOfMind.qmd
    - 10-StrategicDynamicsRPS.qmd
