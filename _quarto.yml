    - 12-CircularInference.qmd
    - 13-CategorizationModelsExemplars.qmd
    - 14-CategorizationModelsPrototypes.qmd
    - 15-CategorizationModelsRules-v2.qmd

  appendices:
    - AppA-BayesianSequentialExtensions.qmd
    - AppB-StanOptimization.qmd
    - AppC-Reparameterization.qmd
    - AppD-StanErrors.qmd
    - AppE-BayesFlowWalkthrough.qmd
